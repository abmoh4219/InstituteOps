<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">InstituteOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'ui-sans-serif', 'system-ui', 'sans-serif']
                    },
                    colors: {
                        brand: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857'
                        }
                    },
                    boxShadow: {
                        soft: '0 10px 35px rgba(15, 23, 42, 0.08)'
                    }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/saas-ui.css}" href="/css/saas-ui.css">
</head>
<body th:fragment="shell(pageTitle, content)">
<div class="min-h-screen bg-slate-50 text-slate-800">
    <div class="flex min-h-screen">
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-72 -translate-x-full border-r border-slate-200 bg-white/95 shadow-soft transition-transform duration-200 lg:static lg:translate-x-0">
            <div class="flex h-16 items-center gap-3 border-b border-slate-100 px-6">
                <div class="grid h-9 w-9 place-items-center rounded-xl bg-brand-600 text-white">
                    <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 20V8l8-4 8 4v12"/><path d="M9 20v-6h6v6"/></svg>
                </div>
                <div>
                    <p class="text-sm font-semibold text-slate-500">SaaS Console</p>
                    <h1 class="text-lg font-extrabold tracking-tight">InstituteOps</h1>
                </div>
            </div>
            <div class="space-y-4 p-4">
                <div class="rounded-2xl border border-slate-200 bg-slate-50 p-3">
                    <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Role Badge</p>
                    <p class="mt-1 inline-flex rounded-full bg-brand-100 px-2.5 py-1 text-xs font-semibold text-brand-700" sec:authentication="authorities">[ROLE]</p>
                </div>

                <nav class="space-y-1 text-sm">
                    <a class="menu-link" th:href="@{/dashboard}">Dashboard</a>
                    <a class="menu-link" sec:authorize="hasRole('SYSTEM_ADMIN')" th:href="@{/admin}">System Admin</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','REGISTRAR_FINANCE_CLERK')" th:href="@{/registrar}">Registrar / Finance</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','INSTRUCTOR')" th:href="@{/instructor/grades}">Instructor Grades</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','INVENTORY_MANAGER')" th:href="@{/inventory}">Inventory</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','PROCUREMENT_APPROVER')" th:href="@{/procurement}">Procurement</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','STORE_MANAGER')" th:href="@{/store}">Store Manager</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','STUDENT','STORE_MANAGER')" th:href="@{/store/student}">Group-Buy Student</a>
                    <a class="menu-link" sec:authorize="hasAnyRole('SYSTEM_ADMIN','REGISTRAR_FINANCE_CLERK','INSTRUCTOR','STUDENT')" th:href="@{/student}">Student Area</a>
                    <a class="menu-link" sec:authorize="hasRole('SYSTEM_ADMIN')" th:href="@{/admin/recommender}">Recommender Admin</a>
                </nav>
                <p class="px-2 text-xs text-slate-500">Quick Search <kbd class="rounded bg-slate-100 px-1.5 py-0.5 font-mono">Ctrl+K</kbd></p>
            </div>
        </aside>

        <div class="flex min-w-0 flex-1 flex-col lg:pl-0">
            <header class="sticky top-0 z-30 border-b border-slate-200 bg-white/80 backdrop-blur">
                <div class="mx-auto flex h-16 max-w-[1400px] items-center justify-between px-4 sm:px-6 lg:px-8">
                    <div class="flex items-center gap-3">
                        <button type="button" id="sidebarToggle" class="inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-600 lg:hidden">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
                        </button>
                        <h2 class="text-lg font-bold" th:text="${pageTitle}">Workspace</h2>
                    </div>
                    <div class="flex items-center gap-3">
                        <button type="button" id="quickSearchBtn" class="hidden items-center gap-2 rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm text-slate-500 md:inline-flex">
                            <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
                            Search
                            <kbd class="rounded bg-slate-100 px-1.5 py-0.5 font-mono text-xs">Ctrl+K</kbd>
                        </button>
                        <button class="relative inline-flex h-10 w-10 items-center justify-center rounded-xl border border-slate-200 text-slate-600">
                            <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 20a2 2 0 1 1-4 0"/><path d="M18 16V11a6 6 0 1 0-12 0v5l-2 2h16z"/></svg>
                            <span class="absolute right-2 top-2 h-2 w-2 rounded-full bg-rose-500"></span>
                        </button>
                        <div class="hidden rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm md:block">
                            <p class="font-semibold" sec:authentication="name">user</p>
                            <p class="text-xs text-slate-500" sec:authentication="authorities">[ROLE]</p>
                        </div>
                        <form method="post" th:action="@{/logout}">
                            <button class="inline-flex items-center gap-2 rounded-xl bg-slate-900 px-3.5 py-2 text-sm font-semibold text-white hover:bg-slate-700" type="submit">
                                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><path d="M10 17l5-5-5-5"/><path d="M15 12H3"/></svg>
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </header>

            <main class="mx-auto w-full max-w-[1400px] flex-1 px-4 py-6 sm:px-6 lg:px-8">
                <div th:replace="${content}"></div>
            </main>
        </div>
    </div>
</div>

<div id="quickSearchModal" class="fixed inset-0 z-50 hidden bg-slate-900/40 backdrop-blur-sm p-4">
    <div class="mx-auto mt-16 max-w-2xl rounded-2xl bg-white p-4 shadow-soft">
        <div class="flex items-center gap-2 rounded-xl border border-slate-200 px-3 py-2">
            <svg class="h-4 w-4 text-slate-500" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            <input id="quickSearchInput" type="text" placeholder="Jump to page..." class="w-full border-0 p-0 text-sm focus:outline-none focus:ring-0">
            <kbd class="rounded bg-slate-100 px-1.5 py-0.5 font-mono text-xs">Esc</kbd>
        </div>
        <div id="quickSearchResults" class="mt-3 space-y-1 text-sm"></div>
    </div>
</div>

<div id="toastHost" class="pointer-events-none fixed bottom-4 right-4 z-50 space-y-2"></div>

<script th:src="@{/js/saas-ui.js}" src="/js/saas-ui.js"></script>
</body>
</html>
