<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InstituteOps Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell">
    <div class="row between">
        <h1>InstituteOps</h1>
        <form method="post" th:action="@{/logout}">
            <button type="submit">Logout</button>
        </form>
    </div>
    <p>Signed in as <strong th:text="${username}">user</strong></p>

    <nav class="grid-links">
        <a sec:authorize="hasRole('SYSTEM_ADMIN')" th:href="@{/admin}">System Administrator</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','REGISTRAR_FINANCE_CLERK')" th:href="@{/registrar}">Registrar / Finance</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','INSTRUCTOR')" th:href="@{/instructor/grades}">Instructor Grades</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','INVENTORY_MANAGER')" th:href="@{/inventory}">Inventory Manager</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','PROCUREMENT_APPROVER')" th:href="@{/procurement}">Procurement Approver</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','STORE_MANAGER')" th:href="@{/store}">Store Manager</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','STUDENT','STORE_MANAGER')" th:href="@{/store/student}">Student Group-Buy</a>
        <a sec:authorize="hasAnyRole('SYSTEM_ADMIN','REGISTRAR_FINANCE_CLERK','INSTRUCTOR','STUDENT')" th:href="@{/student}">Student Area</a>
    </nav>

    <section class="status-block">
        <h2>Internal API test</h2>
        <p>Token/key-based internal route: <code>/api/internal/ping</code> (requires <code>X-API-KEY</code> and <code>X-API-SECRET</code>).</p>
    </section>
</main>
</body>
</html>
