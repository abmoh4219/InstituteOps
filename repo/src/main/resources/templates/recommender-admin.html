<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/app-shell :: head('Recommender Admin')}"></head>
<body th:replace="~{fragments/app-shell :: shell('Offline Recommender Admin', ~{::section})}">
<section class="space-y-6">
    <article class="card p-5">
        <h3 class="mb-4 text-lg font-bold">Model Operations</h3>
        <div class="grid gap-4 xl:grid-cols-3">
            <form method="post" th:action="@{/admin/recommender/train}" class="card p-4 space-y-2">
                <h4 class="font-semibold">Train New Version</h4>
                <input class="field-input" name="modelCode" placeholder="USER_CF_COSINE" required>
                <input class="field-input" type="number" name="topK" min="1" value="5" required>
                <button class="btn-primary" type="submit">Train</button>
            </form>
            <form method="post" th:action="@{/admin/recommender/incremental}" class="card p-4 space-y-2">
                <h4 class="font-semibold">Incremental Update</h4>
                <input class="field-input" name="modelCode" placeholder="USER_CF_COSINE" required>
                <button class="btn-primary" type="submit">Apply Incremental</button>
            </form>
            <form method="post" th:action="@{/admin/recommender/rollback}" class="card p-4 space-y-2">
                <h4 class="font-semibold">Rollback</h4>
                <input class="field-input" name="modelCode" placeholder="USER_CF_COSINE" required>
                <input class="field-input" type="number" name="targetVersionNo" min="1" placeholder="Target version" required>
                <button class="btn-primary" type="submit">Rollback</button>
            </form>
        </div>
    </article>

    <article class="card p-5">
        <h3 class="mb-4 text-lg font-bold">Model Versions</h3>
        <div th:each="card : ${vm.models}" class="mb-4 rounded-xl border border-slate-200 p-4">
            <p class="text-sm font-semibold"><span th:text="${card.model.modelCode}">MODEL</span> <span class="badge badge-warning" th:text="${card.model.algorithmFamily + ' / ' + card.model.similarityMetric}">USER_CF / COSINE</span></p>
            <p class="mt-2 text-sm text-slate-600" th:text="${'Serving recommendations: ' + card.servingRecommendationCount}">Serving recommendations: 0</p>
            <div class="mt-3 overflow-x-auto">
                <table class="data-table">
                    <thead><tr><th>Version</th><th>Status</th><th>Window</th><th>Rollback Of</th><th>Created</th></tr></thead>
                    <tbody>
                    <tr th:each="v : ${card.versions}">
                        <td th:text="${v.versionNo}">1</td>
                        <td><span class="badge badge-success" th:text="${v.trainingStatus}">COMPLETED</span></td>
                        <td th:text="${#temporals.format(v.trainedFrom, 'yyyy-MM-dd') + ' -> ' + #temporals.format(v.trainedTo, 'yyyy-MM-dd')}">window</td>
                        <td th:text="${v.rollbackOfVersion}">-</td>
                        <td th:text="${#temporals.format(v.createdAt, 'yyyy-MM-dd HH:mm')}">date</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </article>
</section>
</body>
</html>
