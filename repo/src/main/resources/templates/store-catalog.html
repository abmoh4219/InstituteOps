<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPU/SKU Catalog</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" href="/css/app.css">
</head>
<body>
<main class="shell wide-shell">
    <div class="row between">
        <h1>SPU / SKU Catalog and Tiered Pricing</h1>
        <a th:href="@{/dashboard}">Back to dashboard</a>
    </div>

    <section class="status-block">
        <div class="grid-2">
            <form method="post" th:action="@{/store/spu}" class="grid-form compact-form">
                <h3>Create SPU</h3>
                <input name="spuCode" placeholder="SPU Code" required>
                <input name="name" placeholder="SPU Name" required>
                <input name="description" placeholder="Description">
                <button type="submit">Create SPU</button>
            </form>

            <form method="post" th:action="@{/store/sku}" class="grid-form compact-form">
                <h3>Create SKU</h3>
                <input type="number" name="spuId" placeholder="SPU ID" required>
                <input name="skuCode" placeholder="SKU Code" required>
                <input name="name" placeholder="SKU Name" required>
                <input name="specs" placeholder='Specs JSON {"color":"red"}'>
                <input type="number" name="purchaseLimitPerStudent" value="5" required>
                <button type="submit">Create SKU</button>
            </form>

            <form method="post" th:action="@{/store/tier}" class="grid-form compact-form">
                <h3>Create Tiered Price</h3>
                <input type="number" name="skuId" placeholder="SKU ID" required>
                <input type="number" name="minQty" placeholder="Min Qty" required>
                <input type="number" step="0.01" name="unitPrice" placeholder="Unit Price" required>
                <input name="currencyCode" value="USD" required>
                <button type="submit">Create Pricing Tier</button>
            </form>
        </div>
    </section>

    <section class="status-block">
        <h2>Catalog</h2>
        <table class="table">
            <thead><tr><th>SPU ID</th><th>Code</th><th>Name</th></tr></thead>
            <tbody>
            <tr th:each="spu : ${spus}">
                <td th:text="${spu.id}">1</td>
                <td th:text="${spu.spuCode}">SPU</td>
                <td th:text="${spu.name}">Name</td>
            </tr>
            </tbody>
        </table>

        <table class="table">
            <thead><tr><th>SKU ID</th><th>SPU</th><th>Code</th><th>Name</th><th>Limit</th></tr></thead>
            <tbody>
            <tr th:each="sku : ${skus}">
                <td th:text="${sku.id}">1</td>
                <td th:text="${sku.spuId}">1</td>
                <td th:text="${sku.skuCode}">SKU</td>
                <td th:text="${sku.name}">Name</td>
                <td th:text="${sku.purchaseLimitPerStudent}">5</td>
            </tr>
            </tbody>
        </table>

        <table class="table">
            <thead><tr><th>Tier ID</th><th>SKU</th><th>Min Qty</th><th>Unit Price</th><th>Currency</th></tr></thead>
            <tbody>
            <tr th:each="tier : ${tiers}">
                <td th:text="${tier.id}">1</td>
                <td th:text="${tier.skuId}">1</td>
                <td th:text="${tier.minQty}">3</td>
                <td th:text="${tier.unitPrice}">25.00</td>
                <td th:text="${tier.currencyCode}">USD</td>
            </tr>
            </tbody>
        </table>
        <p>Tiering example: $29 each or 3+ at $25.</p>
    </section>
</main>
</body>
</html>
