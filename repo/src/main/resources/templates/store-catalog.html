<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/app-shell :: head('Store Catalog')}"></head>
<body th:replace="~{fragments/app-shell :: shell('SPU/SKU Catalog', ~{::section})}">
<section class="space-y-6">
    <article class="card p-5">
        <h3 class="mb-4 text-lg font-bold">Catalog Snapshot</h3>
        <div class="overflow-x-auto">
            <table class="data-table">
                <thead><tr><th>SPU ID</th><th>Code</th><th>Name</th></tr></thead>
                <tbody><tr th:each="spu : ${spus}"><td th:text="${spu.id}">1</td><td th:text="${spu.spuCode}">SPU</td><td th:text="${spu.name}">Name</td></tr></tbody>
            </table>
        </div>
    </article>
</section>
</body>
</html>
