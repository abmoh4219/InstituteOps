services:
  mysql:
    image: mysql:8.4
    container_name: instituteops-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: instituteops
      MYSQL_USER: instituteops
      MYSQL_PASSWORD: instituteops
      MYSQL_ROOT_PASSWORD: root
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: instituteops-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/instituteops?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: instituteops
      SPRING_DATASOURCE_PASSWORD: instituteops
      APP_UPLOAD_BASE_PATH: /uploads
      APP_ENCRYPTION_AES_KEY_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/uploads

  tests:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: instituteops-tests
    working_dir: /workspace
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    environment:
      JAVA_HOME: /opt/java/openjdk
      TEST_DB_HOST: mysql
      TEST_DB_PORT: 3306
      TEST_DB_NAME: instituteops
      TEST_DB_USER: instituteops
      TEST_DB_PASSWORD: instituteops
      APP_ENCRYPTION_AES_KEY_BASE64: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    volumes:
      - ./:/workspace
      - maven_cache:/root/.m2
    command: ./run_test.sh

volumes:
  mysql_data:
  uploads_data:
  maven_cache:
